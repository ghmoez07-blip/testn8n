name: Selenium Tests
on: [push] # Se lance à chaque fois que tu fais un "Push"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # Récupère ton code

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests with Maven
        run: mvn clean test # Lance tes tests